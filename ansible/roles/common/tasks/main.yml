---
- name: Update all system packages
  yum:
    name: "*"
    state: latest
  tags: packages

- name: Install common utilities
  yum:
    name:
      - git
      - wget
      - curl
      - htop
      - vim
      - python3
      - python3-pip
      - unzip
    state: present
  tags: packages

- name: Set system timezone to Asia/Kolkata
  timezone:
    name: Asia/Kolkata
  tags: system

- name: Configure sysctl for performance tuning
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    reload: true
  loop:
    - { key: "net.core.somaxconn", value: "65535" }
    - { key: "vm.swappiness", value: "10" }
  tags: system

- name: Ensure .ssh directory exists for ec2-user
  file:
    path: /home/ec2-user/.ssh
    state: directory
    mode: "0700"
    owner: ec2-user
    group: ec2-user
  tags: security

- name: Set up logrotate for application logs
  template:
    src: logrotate.conf.j2
    dest: /etc/logrotate.d/app
    mode: "0644"
  tags: logging
