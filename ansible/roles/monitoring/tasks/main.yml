---
# --- Node Exporter (runs on all app servers) ---
- name: Create prometheus user
  user:
    name: prometheus
    system: true
    shell: /sbin/nologin
    create_home: false
  tags: node_exporter

- name: Download Node Exporter
  get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
    dest: /tmp/node_exporter.tar.gz
    mode: "0644"
  tags: node_exporter

- name: Extract Node Exporter
  unarchive:
    src: /tmp/node_exporter.tar.gz
    dest: /tmp/
    remote_src: true
  tags: node_exporter

- name: Install Node Exporter binary
  copy:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
    dest: /usr/local/bin/node_exporter
    mode: "0755"
    remote_src: true
  notify: restart node_exporter
  tags: node_exporter

- name: Deploy Node Exporter systemd service
  template:
    src: node_exporter.service.j2
    dest: /etc/systemd/system/node_exporter.service
    mode: "0644"
  notify:
    - reload systemd
    - restart node_exporter
  tags: node_exporter

# --- Prometheus (runs on monitoring server only) ---
- name: Create Prometheus directories
  file:
    path: "{{ item }}"
    state: directory
    owner: prometheus
    group: prometheus
    mode: "0755"
  loop:
    - /etc/prometheus
    - /var/lib/prometheus
  tags: prometheus
  when: "'monitoring' in group_names"

- name: Download Prometheus
  get_url:
    url: "https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version }}/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz"
    dest: /tmp/prometheus.tar.gz
    mode: "0644"
  tags: prometheus
  when: "'monitoring' in group_names"

- name: Extract and install Prometheus
  unarchive:
    src: /tmp/prometheus.tar.gz
    dest: /tmp/
    remote_src: true
  tags: prometheus
  when: "'monitoring' in group_names"

- name: Copy Prometheus binaries
  copy:
    src: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    mode: "0755"
    remote_src: true
  loop:
    - prometheus
    - promtool
  notify: restart prometheus
  tags: prometheus
  when: "'monitoring' in group_names"

- name: Deploy Prometheus configuration
  template:
    src: prometheus.yml.j2
    dest: /etc/prometheus/prometheus.yml
    owner: prometheus
    group: prometheus
    mode: "0644"
  notify: restart prometheus
  tags: prometheus
  when: "'monitoring' in group_names"

- name: Deploy Prometheus systemd service
  template:
    src: prometheus.service.j2
    dest: /etc/systemd/system/prometheus.service
    mode: "0644"
  notify:
    - reload systemd
    - restart prometheus
  tags: prometheus
  when: "'monitoring' in group_names"

# --- Grafana (runs on monitoring server only) ---
- name: Add Grafana yum repository
  yum_repository:
    name: grafana
    description: Grafana OSS
    baseurl: https://rpm.grafana.com
    repo_gpgcheck: true
    gpgcheck: true
    gpgkey: https://rpm.grafana.com/gpg.key
    enabled: true
  tags: grafana
  when: "'monitoring' in group_names"

- name: Install Grafana
  yum:
    name: grafana
    state: present
  notify: restart grafana
  tags: grafana
  when: "'monitoring' in group_names"

- name: Deploy Grafana configuration
  template:
    src: grafana.ini.j2
    dest: /etc/grafana/grafana.ini
    mode: "0640"
    owner: root
    group: grafana
  notify: restart grafana
  tags: grafana
  when: "'monitoring' in group_names"

- name: Enable and start all monitoring services
  systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - node_exporter
    - prometheus
    - grafana-server
  tags: services
  when: "'monitoring' in group_names"

- name: Enable node_exporter on app servers
  systemd:
    name: node_exporter
    enabled: true
    state: started
  tags: services
  when: "'app_servers' in group_names"
